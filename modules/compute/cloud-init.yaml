#cloud-config
# ─── Azure SOC Lab — VM First-Boot Hardening ─────────────────────────────────
# Installs auditd with the audisp-syslog plugin so kernel audit events are
# forwarded to syslog facility local6, which the DCR captures and ships to
# Log Analytics / Sentinel.  Also applies baseline SSH hardening.

packages:
  - auditd
  - audispd-plugins

# ─── Write configuration files ───────────────────────────────────────────────
write_files:

  # Audit rules — MITRE ATT&CK-mapped kernel-level events
  - path: /etc/audit/rules.d/soc-lab.rules
    owner: root:root
    permissions: "0640"
    content: |
      # Delete existing rules
      -D

      # Increase kernel audit buffer size
      -b 8192

      # ── Privilege Escalation (T1548.003) ─────────────────────────────────
      # Monitor writes to sudoers and sudo drop-in directory
      -w /etc/sudoers -p wa -k privilege_escalation
      -w /etc/sudoers.d/ -p wa -k privilege_escalation

      # ── Account Manipulation (T1098 / T1136.001) ──────────────────────────
      # Track changes to local user/group databases
      -w /etc/passwd -p wa -k account_modification
      -w /etc/shadow -p wa -k account_modification
      -w /etc/group  -p wa -k account_modification
      -w /etc/gshadow -p wa -k account_modification

      # ── Persistence — Cron (T1053.003) ────────────────────────────────────
      -w /etc/cron.d/       -p wa -k cron_persistence
      -w /etc/cron.daily/   -p wa -k cron_persistence
      -w /etc/cron.hourly/  -p wa -k cron_persistence
      -w /etc/cron.monthly/ -p wa -k cron_persistence
      -w /etc/cron.weekly/  -p wa -k cron_persistence
      -w /var/spool/cron/   -p wa -k cron_persistence

      # ── Persistence — Systemd (T1543.002) ─────────────────────────────────
      -w /etc/systemd/system/ -p wa -k systemd_persistence
      -w /usr/lib/systemd/system/ -p wa -k systemd_persistence

      # ── Defense Evasion — SSH config tampering (T1098) ─────────────────────
      -w /etc/ssh/sshd_config          -p wa -k ssh_config_change
      -w /etc/ssh/sshd_config.d/       -p wa -k ssh_config_change

      # ── Execution — Privileged command use ────────────────────────────────
      -a always,exit -F path=/usr/bin/sudo  -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged_exec
      -a always,exit -F path=/usr/bin/su    -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged_exec
      -a always,exit -F path=/usr/bin/newgrp -F perm=x -F auid>=1000 -F auid!=4294967295 -k privileged_exec

      # Make the ruleset immutable — requires reboot to change
      -e 2

  # audisp-syslog plugin — routes auditd events to syslog local6
  - path: /etc/audit/plugins.d/syslog.conf
    owner: root:root
    permissions: "0640"
    content: |
      active = yes
      direction = out
      path = builtin_syslog
      type = builtin
      args = LOG_LOCAL6
      format = string

  # SSH hardening drop-in (appended after the distro default config)
  - path: /etc/ssh/sshd_config.d/99-soc-hardening.conf
    owner: root:root
    permissions: "0600"
    content: |
      # SOC Lab baseline SSH hardening
      PermitRootLogin no
      MaxAuthTries 3
      LoginGraceTime 30
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowTcpForwarding no
      X11Forwarding no

# ─── Enable and (re)start services ───────────────────────────────────────────
runcmd:
  - systemctl enable auditd
  - systemctl restart auditd
  - systemctl restart ssh
